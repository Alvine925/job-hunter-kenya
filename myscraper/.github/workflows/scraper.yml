name: Scheduled Job Scraper Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, and 18:00 UTC everyday (every 6 hours)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows you to trigger the scraper manually from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Job Scraper Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE || 'scrapy_jobs' }}
          MYJOBSINKENYA_EMAIL: ${{ secrets.MYJOBSINKENYA_EMAIL }}
          MYJOBSINKENYA_PASSWORD: ${{ secrets.MYJOBSINKENYA_PASSWORD }}
          # Set MAX_PAGES to 5 on cloud runners to prevent long-running jobs and respect rate limits
          MAX_PAGES: "5"
        run: |
          # Runs all spiders once sequentially (brightermonday, myjobmag, fuzu, myjobsinkenya)
          python run.py
