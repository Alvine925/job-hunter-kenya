<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Tellus">
  <title>Tellus</title>
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F28A3D"/>
      <stop offset="1" stop-color="#D64F0F"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#tg)"/>
  <!-- horizon / serif of the T -->
  <rect x="14" y="22" width="36" height="6" rx="3" fill="#FFFFFF"/>
  <!-- rising stem -->
  <rect x="29" y="22" width="6" height="26" rx="3" fill="#FFFFFF"/>
  <!-- match dot / spark above -->
  <circle cx="32" cy="14" r="4" fill="#FFFFFF"/>
  <!-- subtle baseline arc echoing the orbital loader -->
  <path d="M16 50 Q32 58 48 50" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55"/>
</svg>
